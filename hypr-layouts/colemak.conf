# Навигационные биндинги — раскладка Colemak-DH
# Физические позиции HJKL → клавиши MNEI на Colemak
# Переключиться обратно: source этот файл вместо qwerty.conf

# ──── Фокус (MNEI = физ. HJKL на Colemak) ────
bind = $mainMod, M, movefocus, l
bind = $mainMod, N, movefocus, d
bind = $mainMod, E, movefocus, u
bind = $mainMod, I, movefocus, r

# ──── Перемещение окон ────
bind = $mainMod SHIFT, M, movewindow, l
bind = $mainMod SHIFT, N, movewindow, d
bind = $mainMod SHIFT, E, movewindow, u
bind = $mainMod SHIFT, I, movewindow, r

# ──── Ресайз ────
binde = $mainMod CTRL, M, resizeactive, -30 0
binde = $mainMod CTRL, N, resizeactive, 0 30
binde = $mainMod CTRL, E, resizeactive, 0 -30
binde = $mainMod CTRL, I, resizeactive, 30 0
