# cava-конфиг для eww-осциллографа
# output: raw stdout в ascii, 28 баров, значения 0..1000, разделитель ";", кадр — "\n"
[general]
bars = 40
framerate = 30
sensitivity = 100
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
; "waves" = соседние бары тянут друг друга → непрерывная линия-волна
integral = 90
monstercat = 1
waves = 1
gravity = 100
